<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax — Redirecting</title>

<!-- UPDATE THIS URL when the standalone Parallax site is live -->
<meta http-equiv="refresh" content="2;url=https://parallax-ai.net">
<script>
  // Update this URL to match the meta refresh above
  setTimeout(function(){ window.location.replace("https://parallax-ai.net"); }, 2000);
</script>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e1012;color:#e8e8e8;font-family:'Inter','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
  .redirect-box{max-width:480px;padding:3rem 2rem}
  h1{font-family:'Noto Serif Display',serif;font-size:2rem;color:#d4a017;margin-bottom:1rem}
  p{font-size:1.05rem;line-height:1.7;color:#b0a99e;margin-bottom:1.5rem}
  a{color:#639b8d;text-decoration:none;border-bottom:1px solid rgba(99,155,141,0.3);transition:color 0.3s}
  a:hover{color:#d4a017}
  .spinner{width:24px;height:24px;border:2px solid rgba(99,155,141,0.2);border-top-color:#639b8d;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="redirect-box">
  <h1>Parallax</h1>
  <p>Parallax now lives on its own site.<br>Redirecting you in a moment...</p>
  <div class="spinner"></div>
  <p style="margin-top:1.5rem;font-size:0.85rem;">
    Not redirecting? <a href="https://parallax-ai.net">Click here</a>
  </p>
</div>
</body>
</html>
